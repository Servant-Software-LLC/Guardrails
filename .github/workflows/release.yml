# Release pipeline for the `ServantSoftware.Guardrails` dotnet tool.
#
# Trigger: pushing a tag of the form `v*` (e.g. `v1.0.0-preview.1`). The package Version is
# derived FROM the tag (the leading `v` is stripped): tag `v1.2.3` publishes version `1.2.3`,
# tag `v1.0.0-preview.2` publishes `1.0.0-preview.2`. The <Version> in the csproj is only a
# default for local `dotnet pack`; the tag is the source of truth for a published release.
# NuGet refuses to republish an existing version, so cutting a new release = pushing a new tag.
#
# Flow: the 3-OS test matrix must pass on the tagged commit; only then does the `publish`
# job pack and push to NuGet.org.
#
# AUTH — Trusted Publishing (OIDC). No long-lived API key to create, store, or rotate.
# Configure once:
#   1. nuget.org → your username → Trusted Publishing → add a policy with:
#        Repository Owner = Servant-Software-LLC
#        Repository       = Guardrails
#        Workflow File    = release.yml      (file name only, no .github/workflows/ path)
#        Environment      = (leave empty — this workflow uses no environment)
#      Choose the policy owner that owns the package on nuget.org (your account or the org).
#   2. Add ONE repo secret, NUGET_USER = your nuget.org PROFILE NAME (not your email).
#      It is not sensitive; it just tells NuGet/login which account to mint a key for.
# At publish time the job mints a GitHub OIDC token, NuGet/login exchanges it for a
# short-lived (1 h) key via the policy above, and dotnet pushes with it.

name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore Guardrails.sln

      - name: Build
        run: dotnet build Guardrails.sln --configuration Release --no-restore

      - name: Test (Core)
        run: dotnet test tests/Guardrails.Core.Tests/Guardrails.Core.Tests.csproj --configuration Release --no-build

      - name: Test (Integration)
        run: dotnet test tests/Guardrails.Integration.Tests/Guardrails.Integration.Tests.csproj --configuration Release --no-build

  publish:
    name: pack and publish to NuGet.org
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # let this job mint a GitHub OIDC token for NuGet Trusted Publishing

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Pack (version from tag)
        # Strip the leading `v` from the tag so `v1.0.0-preview.1` → package version 1.0.0-preview.1.
        run: dotnet pack src/Guardrails.Cli -c Release -o nupkg -p:Version="${GITHUB_REF_NAME#v}"

      - name: NuGet login (OIDC → short-lived API key)
        # Exchanges this job's OIDC token for a 1-hour nuget.org key via the Trusted Publishing
        # policy. Done right before push so the key can't expire. user = nuget.org profile name.
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet.org
        run: dotnet nuget push "nupkg/*.nupkg" --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
