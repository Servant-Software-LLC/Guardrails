name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-and-test:
    name: build-and-test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      # --locked-mode fails the build if restore would resolve anything other than the committed
      # packages.lock.json — guaranteeing CI and every developer use a byte-identical NuGet graph
      # (including analyzer packages). To intentionally change versions, bump the package reference
      # and re-run `dotnet restore --force-evaluate`, which updates the lock files.
      - name: Restore
        run: dotnet restore Guardrails.sln --locked-mode

      - name: Build
        run: dotnet build Guardrails.sln --configuration Release --no-restore

      - name: Test (Core)
        run: dotnet test tests/Guardrails.Core.Tests/Guardrails.Core.Tests.csproj --configuration Release --no-build

      - name: Test (Integration)
        run: dotnet test tests/Guardrails.Integration.Tests/Guardrails.Integration.Tests.csproj --configuration Release --no-build

      # Guard the committed golden example's diagram.md against drift: `graph --check` recomputes
      # the plan's semantic source hash and compares it to the one stamped in the committed file.
      # Exit 0 = fresh, 2 = stale/missing (regenerate with `guardrails graph <folder>`). If the
      # plan changes without regenerating the diagram, this fails CI. (#3)
      - name: Example diagram is fresh (graph --check)
        run: dotnet run --project src/Guardrails.Cli --configuration Release --no-build -- graph examples/hello-guardrails/hello-guardrails --check

  # End-to-end packaged-tool smoke (#171): pack the REAL tool package, install it to an
  # isolated --tool-path, run `skills install` + `--version`, and FAIL if the skills/ payload
  # is missing, an installed SKILL.md is unstamped, or --version reports drift. This catches a
  # "build-green-but-package-broken" state the build/test suite cannot see (it asserts against
  # $(OutDir), not the packaged artifact — exactly how #169 shipped broken across preview.27–30).
  # Ubuntu alone suffices: the bug was platform-agnostic, and the script is the same one the
  # release pipeline runs as a pre-publish gate.
  packaged-tool-smoke:
    name: packaged-tool-smoke (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Smoke (pack → install → assert)
        run: .github/scripts/smoke-packaged-tool.sh
